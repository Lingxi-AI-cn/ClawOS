#!/usr/bin/env bash
#
# build-env.conf - ClawOS AOSP 构建参数配置
#
# 所有构建脚本 source 此文件获取统一配置。
# 修改此文件即可切换构建目标等参数。
#
# 自 AOSP 16 起，所有产品 (模拟器 + Pixel GSI) 共享同一源码树。
#

# ──────────────────────────────────────────────────────────────
# AOSP 源码 (统一使用 Android 16)
# ──────────────────────────────────────────────────────────────

AOSP_BRANCH="android-16.0.0_r4"
AOSP_SOURCE_DIR="${AOSP_SOURCE_DIR:-/opt/aosp}"

# 兼容旧脚本引用
AOSP16_BRANCH="$AOSP_BRANCH"
AOSP16_SOURCE_DIR="$AOSP_SOURCE_DIR"

# ──────────────────────────────────────────────────────────────
# repo manifest URL
# ──────────────────────────────────────────────────────────────

AOSP_MANIFEST_URL="${AOSP_MANIFEST_URL:-https://mirrors.tuna.tsinghua.edu.cn/git/AOSP/platform/manifest}"
AOSP_MIRROR_URL="${AOSP_MIRROR_URL:-https://mirrors.tuna.tsinghua.edu.cn/git/AOSP}"

# ──────────────────────────────────────────────────────────────
# 网络代理 (如果使用 VPN/Clash/Sing-box 而非镜像)
# ──────────────────────────────────────────────────────────────

HTTP_PROXY_URL="${HTTP_PROXY_URL:-}"
HTTPS_PROXY_URL="${HTTPS_PROXY_URL:-}"

# ──────────────────────────────────────────────────────────────
# 构建目标
# ──────────────────────────────────────────────────────────────

# 模拟器 (AOSP 16, goldfish emu64a)
AOSP_EMU_LUNCH_TARGET="sdk_clawos_arm64-trunk_staging-userdebug"

# Pixel 8 Pro GSI (AOSP 16)
AOSP_GSI_LUNCH_TARGET="clawos_gsi_arm64-trunk_staging-userdebug"

# 兼容旧脚本引用
AOSP_LUNCH_TARGET="$AOSP_EMU_LUNCH_TARGET"
AOSP16_LUNCH_TARGET="$AOSP_GSI_LUNCH_TARGET"

# 构建并行度 (默认使用所有 CPU 核心)
BUILD_JOBS="${BUILD_JOBS:-$(nproc 2>/dev/null || echo 4)}"

# ──────────────────────────────────────────────────────────────
# ccache 配置
# ──────────────────────────────────────────────────────────────

USE_CCACHE="${USE_CCACHE:-1}"
CCACHE_DIR="${CCACHE_DIR:-/home/${USER}/.ccache}"
CCACHE_MAX_SIZE="${CCACHE_MAX_SIZE:-50G}"

# ──────────────────────────────────────────────────────────────
# 镜像传输
# ──────────────────────────────────────────────────────────────

LINUX_USER="${LINUX_USER:-}"
LINUX_HOST="${LINUX_HOST:-}"
LINUX_PORT="${LINUX_PORT:-22}"

MAC_USER="${MAC_USER:-}"
MAC_HOST="${MAC_HOST:-}"
MAC_IMAGE_DIR="${MAC_IMAGE_DIR:-~/clawos-emulator-images}"

# ──────────────────────────────────────────────────────────────
# 输出路径
# ──────────────────────────────────────────────────────────────

# 模拟器 (PRODUCT_DEVICE=emu64a)
AOSP_EMU_OUT_DIR="${AOSP_SOURCE_DIR}/out/target/product/emu64a"

# Pixel 8 Pro GSI (PRODUCT_DEVICE=clawos_gsi_arm64)
AOSP_GSI_OUT_DIR="${AOSP_SOURCE_DIR}/out/target/product/clawos_gsi_arm64"

# 兼容旧脚本引用
AOSP_OUT_DIR="$AOSP_EMU_OUT_DIR"
AOSP16_OUT_DIR="$AOSP_GSI_OUT_DIR"
