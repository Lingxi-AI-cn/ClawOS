<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>ClawOS</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a14;
      }
      #clawos-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a14;
        z-index: 99999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.5s ease;
      }
      #clawos-loader .title {
        color: #22d3ee;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 4px;
        margin-bottom: 16px;
      }
      #clawos-loader .subtitle {
        color: rgba(255,255,255,0.5);
        font-size: 14px;
      }
      #clawos-loader .dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
      }
      @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
      }
    </style>
  </head>
  <body>
    <div id="clawos-loader">
      <div class="title">ClawOS</div>
      <div class="subtitle">正在初始化<span class="dots"></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
